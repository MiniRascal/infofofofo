syntax = "proto3";

package driver;

option csharp_namespace = "InfoPanel.PeripheralBattery.Gamakay.Proto";

// Reconstructed from the Gamakay ("2.4G Wireless Keyboard") Electron app's
// bundled index.js - it ships a protobuf-ts client for this exact service,
// talking to a local background process (iot_driver_v<version>.exe) over
// gRPC-Web at http://127.0.0.1:3814. That background process does the real
// HID work and hands back already-parsed device status - no raw HID report
// reverse-engineering needed.
//
// Only the pieces needed for battery/online status are reconstructed here.
// devType/type are left as int32 since the enum value names weren't found -
// wire-compatible with the real enum either way, we just don't decode them.
//
// NOTE: there is no "charging" field anywhere in this protocol. The app's
// own UI doesn't show charging status for this device either - only a
// battery percentage and an online flag. If you need charging status for
// the Gamakay, it isn't available through this channel.

service DriverGrpc {
  rpc WatchDevList(Empty) returns (stream DeviceList);
}

message Empty {}

message Device {
  int32 devType = 1;
  bool is24 = 2;
  string path = 3;
  int32 id = 4;
  uint32 battery = 5;
  bool isOnline = 6;
  uint32 vid = 7;
  uint32 pid = 8;
}

// Battery/online status for one half of a combo dongle (e.g. keyboard+mouse
// sharing one receiver). Confirmed field layout from the app's source.
message Status24 {
  uint32 battery = 1;
  bool is_online = 2;
}

// Wraps either "not present" or a real status for one sub-device slot.
message DangleDevOrEmpty {
  oneof dangleDev {
    Empty empty = 1;
    Status24 status = 2;
  }
}

// Combo-dongle variant: a single receiver serving a keyboard and/or mouse.
// The TK75HE V2 is keyboard-only so this branch is unlikely to fire in
// practice, but it's handled defensively in case the driver reports through
// it instead of the plain Device message above.
message DangleCommonDevice {
  DangleDevOrEmpty keyboard = 1;
  DangleDevOrEmpty mouse = 2;
  string path = 3;
  uint32 keyboard_id = 5;
  uint32 mouse_id = 6;
  uint32 vid = 7;
  uint32 pid = 8;
}

message DJDev {
  oneof oneofDev {
    Device dev = 1;
    DangleCommonDevice dangleCommonDev = 2;
  }
}

message DeviceList {
  repeated DJDev devList = 1;
  int32 type = 2;
}
